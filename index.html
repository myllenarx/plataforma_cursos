<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Plataforma de Cursos</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">Plataforma de Cursos</span>
    </div>
</nav>

<div class="container mt-4">

    <!-- CATEGORIA -->
    <div class="card mb-4">
        <div class="card-header">Cadastrar Categoria</div>
        <div class="card-body">

            <input id="nomeCategoria" class="form-control mb-2" placeholder="Nome">
            <input id="descCategoria" class="form-control mb-2" placeholder="Descrição">

            <button class="btn btn-primary" onclick="cadastrarCategoria()">
                Salvar
            </button>

        </div>
    </div>

    <!-- LISTA DE CATEGORIAS -->
    <div class="card mb-4">
        <div class="card-header">Categorias</div>
        <ul id="listaCategorias" class="list-group list-group-flush"></ul>
    </div>

    <!-- CURSO -->
    <div class="card mb-4">
        <div class="card-header">Cadastrar Curso</div>
        <div class="card-body">

            <input id="tituloCurso" class="form-control mb-2" placeholder="Título">
            <input id="descCurso" class="form-control mb-2" placeholder="Descrição">

            <select id="selectCategoria" class="form-control mb-2">
                <option value="">Selecione uma categoria</option>
            </select>

            <button class="btn btn-success" onclick="cadastrarCurso()">
                Salvar Curso
            </button>

        </div>
    </div>

    <!-- LISTA DE CURSOS -->
    <div class="card">
        <div class="card-header">Cursos</div>
        <ul id="listaCursos" class="list-group list-group-flush"></ul>
    </div>

</div>

<div class="card mt-4">
    <div class="card-header">Cadastrar Usuário</div>
    <div class="card-body">

        <input id="nomeUsuario" class="form-control mb-2" placeholder="Nome">
        <input id="emailUsuario" class="form-control mb-2" placeholder="Email">

        <button class="btn btn-primary" onclick="cadastrarUsuario()">
            Salvar Usuário
        </button>

    </div>
</div>

<div class="card mt-4">
    <div class="card-header">Usuários</div>
    <ul id="listaUsuarios" class="list-group list-group-flush"></ul>
</div>

<div class="card mt-4">
    <div class="card-header">Realizar Matrícula</div>
    <div class="card-body">

        <select id="selectUsuario" class="form-control mb-2">
            <option value="">Selecione um usuário</option>
        </select>

        <select id="selectCursoMatricula" class="form-control mb-2">
            <option value="">Selecione um curso</option>
        </select>

        <button class="btn btn-warning" onclick="realizarMatricula()">
            Matricular
        </button>

    </div>
</div>

<div class="card mt-4">
    <div class="card-header">Matrículas</div>
    <ul id="listaMatriculas" class="list-group list-group-flush"></ul>
</div>

<script src="js/app.js"></script>
</body>
</html>
